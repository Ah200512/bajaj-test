<!DOCTYPE html>
<html lang='en'>
  <head>
    <meta charset='UTF-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <title>Bajaj Test</title>
    <link rel='stylesheet' href='./styles.css' />
  </head>
  <body>
    <div class='page-shell'>
      <header class='hero'>
        <div>
          <h1>Bajaj Test</h1>
          <p class='hero-copy'>Analyze node hierarchy relationships, detect cycles, and validate edge data.</p>
        </div>
      </header>

      <main class='layout'>
        <section class='panel input-panel'>
          <div class='panel-head'>
            <h2>Node Input</h2>
            <button id='btnLoad' type='button' class='ghost-button'>Load Sample</button>
          </div>

          <label class='field-label' for='inpApi'>API Base URL</label>
          <input id='inpApi' type='url' placeholder='http://localhost:3000' />

          <label class='field-label' for='txtData'>Edges</label>
          <textarea id='txtData' rows='12' placeholder='One per line, comma-separated, or JSON array. Example:&#10;A->B&#10;A->C&#10;B->D'></textarea>

          <div class='button-row'>
            <button id='btnRun' type='button' class='primary-button'>Process</button>
            <button id='btnReset' type='button' class='secondary-button'>Reset</button>
          </div>

          <p class='helper-text'>Format: <code>X-&gt;Y</code> (Single uppercase letters)</p>
          <div id='msgBox' class='status-banner hidden'></div>
        </section>

        <section class='panel response-panel'>
          <div class='panel-head'>
            <h2>Results Viewer</h2>
            <span id='lblStatus' class='request-state'>Waiting for input</span>
          </div>

          <div id='viewWait' class='empty-state'>Process a request to see the results here.</div>

          <div id='viewResults' class='response-content hidden'>
            <div id='gridUser' class='info-grid'></div>
            <div id='gridStat' class='summary-grid'></div>
            <div id='listGraphs' class='hierarchy-list'></div>
            <div id='gridErr' class='lists-grid'></div>
          </div>
        </section>
      </main>
    </div>

    <script src='./config.js'></script>
    <script src='./app.js'></script>
  </body>
</html>
